name: Draft release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ inputs.tag }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          mkdir -p dist package
          name="stash-gen-worker-${TAG#v}-${GOOS}-${GOARCH}"
          bin="stash-gen-worker"
          if [ "$GOOS" = "windows" ]; then
            bin="${bin}.exe"
          fi

          GOOS="$GOOS" GOARCH="$GOARCH" go build -o "package/${bin}" ./cmd/stash-gen-worker

          if [ "$ARCHIVE" = "zip" ]; then
            (
              cd package
              zip -r "../dist/${name}.zip" "${bin}"
            )
          else
            tar -C package -czf "dist/${name}.tar.gz" "${bin}"
          fi

          rm -rf package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  draft-release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: true
          files: dist/*
